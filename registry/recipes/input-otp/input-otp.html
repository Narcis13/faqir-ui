<!-- Numeric, 6 digits (default) — the real input carries the mobile OTP hints -->
<div data-ui="input-otp" data-length="6" data-mode="numeric">
  <input
    data-part="input"
    type="text"
    inputmode="numeric"
    autocomplete="one-time-code"
    pattern="[0-9]*"
    maxlength="6"
    autocapitalize="off"
    autocorrect="off"
    spellcheck="false"
    aria-label="One-time code"
    l-mask="999999"
  />
  <div data-part="segments" aria-hidden="true">
    <div data-part="segment"></div>
    <div data-part="segment"></div>
    <div data-part="segment"></div>
    <div data-part="segment"></div>
    <div data-part="segment"></div>
    <div data-part="segment"></div>
  </div>
</div>

<!-- Alphanumeric, 5 characters — inputmode="text" so the code can contain letters -->
<div data-ui="input-otp" data-length="5" data-mode="alphanumeric">
  <input
    data-part="input"
    type="text"
    inputmode="text"
    autocomplete="one-time-code"
    maxlength="5"
    autocapitalize="off"
    autocorrect="off"
    spellcheck="false"
    aria-label="Verification code"
  />
  <div data-part="segments" aria-hidden="true">
    <div data-part="segment"></div>
    <div data-part="segment"></div>
    <div data-part="segment"></div>
    <div data-part="segment"></div>
    <div data-part="segment"></div>
  </div>
</div>

  <div data-part="segments" aria-hidden="true">

    <div data-part="segment"></div>
    <div data-part="segment"></div>
  </div>
</div>
