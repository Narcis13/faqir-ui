<!-- @ui:controller dialog.js -->

<!-- Default (medium) -->
<div data-ui="dialog" data-state="closed" id="demo-dialog">
  <button data-part="trigger">Open Dialog</button>

  <div data-part="overlay" hidden></div>

  <div
    data-part="panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="demo-dialog-title"
    data-size="md"
    hidden
  >
    <div data-part="header">
      <h2 id="demo-dialog-title" data-part="title">Dialog Title</h2>
      <button data-part="close" aria-label="Close dialog">&#x2715;</button>
    </div>
    <div data-part="body">
      <p>This is the dialog body content.</p>
    </div>
    <div data-part="footer">
      <button data-ui="button" data-part="close" data-variant="outline">Cancel</button>
      <button data-ui="button" data-variant="primary">Confirm</button>
    </div>
  </div>
</div>

<!-- Small danger variant -->
<div data-ui="dialog" data-state="closed" id="danger-dialog">
  <button data-part="trigger">Delete Account</button>

  <div data-part="overlay" hidden></div>

  <div
    data-part="panel"
    data-variant="danger"
    data-size="sm"
    role="dialog"
    aria-modal="true"
    aria-labelledby="danger-dialog-title"
    hidden
  >
    <div data-part="header">
      <h2 id="danger-dialog-title" data-part="title">Are you sure?</h2>
      <button data-part="close" aria-label="Close dialog">&#x2715;</button>
    </div>
    <div data-part="body">
      <p data-part="description">This action cannot be undone.</p>
    </div>
    <div data-part="footer">
      <button data-ui="button" data-part="close" data-variant="outline">Cancel</button>
      <button data-ui="button" data-variant="destructive">Delete</button>
    </div>
  </div>
</div>
