<!-- @ui:requires faqir-core.js faqir-validate.js -->
<form id="faqir-form" l-data l-validate>
  <div data-ui="field-group">
    <label data-part="label" for="faqir-field-seats">Seats <span data-part="required">*</span></label>
    <div data-part="input">
      <input data-ui="input" id="faqir-field-seats" name="seats" required aria-required="true" aria-describedby="faqir-field-seats-error" type="number" value="4" min="1" max="20" step="1">
    </div>
    <p data-part="error" id="faqir-field-seats-error" aria-live="polite"></p>
  </div>
</form>
