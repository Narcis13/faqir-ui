<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loom Board — Kanban Board</title>

  <!-- Tokens -->
  <link rel="stylesheet" href="../registry/tokens/palette.css">
  <link rel="stylesheet" href="../registry/tokens/spacing.css">
  <link rel="stylesheet" href="../registry/tokens/typography.css">
  <link rel="stylesheet" href="../registry/tokens/effects.css">
  <link rel="stylesheet" href="../registry/tokens/motion.css">
  <link rel="stylesheet" href="../registry/tokens/semantic.css">
  <link rel="stylesheet" href="../registry/tokens/aliases.css">

  <!-- Base -->
  <link rel="stylesheet" href="../registry/base/reset.css">
  <link rel="stylesheet" href="../registry/base/prose.css">

  <!-- Theme -->
  <link rel="stylesheet" href="../registry/themes/default.css">

  <!-- Primitives -->
  <link rel="stylesheet" href="../registry/primitives/button/button.css">
  <link rel="stylesheet" href="../registry/primitives/input/input.css">
  <link rel="stylesheet" href="../registry/primitives/badge/badge.css">
  <link rel="stylesheet" href="../registry/primitives/card/card.css">
  <link rel="stylesheet" href="../registry/primitives/separator/separator.css">
  <link rel="stylesheet" href="../registry/primitives/avatar/avatar.css">
  <link rel="stylesheet" href="../registry/primitives/textarea/textarea.css">
  <link rel="stylesheet" href="../registry/primitives/select/select.css">

  <style>
    /* ── App Shell ── */
    * { box-sizing: border-box; }

    body {
      background: var(--color-bg-subtle);
      color: var(--color-fg);
      font-family: var(--font-sans);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    [l-cloak] { display: none !important; }

    /* ── Top Header ── */
    .kb-header {
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
      box-shadow: var(--shadow-xs);
    }

    .kb-logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .kb-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--color-primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: var(--weight-bold);
      font-size: var(--text-sm);
    }

    .kb-logo-text {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-fg);
      letter-spacing: -0.02em;
    }

    .kb-project-name {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      padding: var(--space-1) var(--space-3);
      background: var(--color-bg-muted);
      border-radius: var(--radius-full);
    }

    .kb-header-spacer { flex: 1; }

    .kb-team {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .kb-team [data-ui="avatar"] {
      margin-left: -8px;
      border: 2px solid var(--color-bg);
      transition: transform var(--duration-fast) var(--ease-default);
    }

    .kb-team [data-ui="avatar"]:first-child {
      margin-left: 0;
    }

    .kb-team [data-ui="avatar"]:hover {
      transform: translateY(-2px);
      z-index: 1;
    }

    /* ── Filters & Search Bar ── */
    .kb-toolbar {
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .kb-toolbar-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kb-search-wrap {
      position: relative;
      width: 240px;
    }

    .kb-search-wrap svg {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-fg-muted);
      pointer-events: none;
    }

    .kb-search-wrap [data-ui="input"] {
      padding-left: var(--space-10);
      height: 32px;
      font-size: var(--text-xs);
    }

    .kb-filter-select {
      height: 32px;
      font-size: var(--text-xs);
      width: auto;
      min-width: 130px;
    }

    /* ── Stats Bar ── */
    .kb-stats {
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-2) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-6);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
    }

    .kb-stat {
      display: flex;
      align-items: center;
      gap: var(--space-1h);
    }

    .kb-stat-value {
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
    }

    .kb-progress-bar {
      width: 120px;
      height: 6px;
      background: var(--color-bg-muted);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .kb-progress-fill {
      height: 100%;
      background: var(--color-success);
      border-radius: var(--radius-full);
      transition: width var(--duration-slow) var(--ease-default);
    }

    /* ── Board ── */
    .kb-board {
      flex: 1;
      display: flex;
      gap: var(--space-5);
      padding: var(--space-5) var(--space-6);
      overflow-x: auto;
      align-items: flex-start;
    }

    .kb-board::-webkit-scrollbar {
      height: 8px;
    }

    .kb-board::-webkit-scrollbar-track {
      background: var(--color-bg-muted);
      border-radius: var(--radius-full);
    }

    .kb-board::-webkit-scrollbar-thumb {
      background: var(--color-border-strong);
      border-radius: var(--radius-full);
    }

    /* ── Column ── */
    .kb-column {
      flex: 0 0 320px;
      min-width: 320px;
      background: var(--color-bg-muted);
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 200px);
    }

    .kb-column-header {
      padding: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .kb-column-accent {
      width: 4px;
      height: 16px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    .kb-column-title {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
      flex: 1;
    }

    .kb-column-count {
      font-size: var(--text-xs);
      min-width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      background: var(--color-bg);
      color: var(--color-fg-muted);
      font-weight: var(--weight-medium);
    }

    .kb-column-cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 var(--space-3) var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-2h);
    }

    .kb-column-cards::-webkit-scrollbar {
      width: 4px;
    }

    .kb-column-cards::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: var(--radius-full);
    }

    .kb-column-footer {
      padding: var(--space-3);
    }

    /* ── WIP Warning ── */
    .kb-wip-warning {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: 0.625rem;
      padding: 0 var(--space-2);
      border-radius: var(--radius-full);
      background: var(--color-warning-subtle);
      color: var(--color-warning);
      font-weight: var(--weight-semibold);
      height: 22px;
    }

    /* ── Kanban Card ── */
    .kb-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      cursor: pointer;
      transition: box-shadow var(--duration-fast) var(--ease-default),
                  border-color var(--duration-fast) var(--ease-default),
                  transform var(--duration-fast) var(--ease-default);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .kb-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-border-strong);
      transform: translateY(-1px);
    }

    .kb-card-title-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
    }

    .kb-card-title {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
      flex: 1;
      line-height: var(--leading-snug);
    }

    .kb-card-title-input {
      flex: 1;
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      padding: var(--space-1) var(--space-2);
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-sm);
      outline: none;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-fg);
    }

    .kb-card-desc {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      line-height: var(--leading-normal);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .kb-card-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .kb-card-tags {
      display: flex;
      gap: var(--space-1);
      flex-wrap: wrap;
    }

    .kb-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--space-1);
    }

    .kb-card-footer-left {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .kb-card-assignee {
      display: flex;
      align-items: center;
      gap: var(--space-1h);
    }

    .kb-card-assignee-avatar {
      width: 22px;
      height: 22px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: var(--weight-semibold);
      color: white;
      flex-shrink: 0;
    }

    .kb-card-assignee-name {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
    }

    .kb-card-due {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .kb-card-due.overdue {
      color: var(--color-destructive);
    }

    .kb-card-actions {
      display: flex;
      gap: var(--space-1);
      opacity: 0;
      transition: opacity var(--duration-fast) var(--ease-default);
    }

    .kb-card:hover .kb-card-actions {
      opacity: 1;
    }

    .kb-move-btn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-fg-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: all var(--duration-fast) var(--ease-default);
      font-size: 12px;
    }

    .kb-move-btn:hover {
      background: var(--color-primary-subtle);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    /* ── Inline Add Form ── */
    .kb-add-form {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .kb-form-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--color-fg-muted);
      margin-bottom: var(--space-1);
      display: block;
    }

    .kb-form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .kb-form-row {
      display: flex;
      gap: var(--space-2);
    }

    .kb-form-row > * {
      flex: 1;
    }

    .kb-form-actions {
      display: flex;
      gap: var(--space-2);
      justify-content: flex-end;
    }

    .kb-tag-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .kb-tag-checkbox {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      cursor: pointer;
    }

    .kb-tag-checkbox input {
      accent-color: var(--color-primary);
    }

    /* ── Card Detail Overlay ── */
    .kb-overlay {
      position: fixed;
      inset: 0;
      background: oklch(0 0 0 / 0.5);
      z-index: var(--z-overlay);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--space-12) var(--space-6);
      overflow-y: auto;
    }

    .kb-detail {
      background: var(--color-bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      animation: kb-slide-up var(--duration-slow) var(--ease-out);
    }

    @keyframes kb-slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .kb-detail-header {
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }

    .kb-detail-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .kb-detail-title {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-fg);
      flex: 1;
    }

    .kb-detail-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-fg-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      flex-shrink: 0;
      transition: background var(--duration-fast) var(--ease-default);
    }

    .kb-detail-close:hover {
      background: var(--color-bg-muted);
    }

    .kb-detail-meta {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .kb-detail-meta-item {
      display: flex;
      align-items: center;
      gap: var(--space-1h);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
    }

    .kb-detail-body {
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .kb-detail-section-title {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
      margin-bottom: var(--space-2);
    }

    .kb-detail-description {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      line-height: var(--leading-relaxed);
    }

    /* ── Comments ── */
    .kb-comments {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .kb-comment {
      display: flex;
      gap: var(--space-3);
    }

    .kb-comment-body {
      flex: 1;
    }

    .kb-comment-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-1);
    }

    .kb-comment-author {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
    }

    .kb-comment-time {
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
    }

    .kb-comment-text {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      line-height: var(--leading-normal);
    }

    .kb-comment-form {
      display: flex;
      gap: var(--space-2);
      align-items: flex-start;
    }

    .kb-comment-form textarea {
      flex: 1;
    }

    /* ── Activity Log ── */
    .kb-activity {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .kb-activity-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
    }

    .kb-activity-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-border-strong);
      margin-top: 4px;
      flex-shrink: 0;
    }

    .kb-activity-text strong {
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
    }

    /* ── Footer ── */
    .kb-footer {
      text-align: center;
      padding: var(--space-6);
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      border-top: 1px solid var(--color-border);
      background: var(--color-bg);
    }

    .kb-footer strong {
      color: var(--color-primary);
      font-weight: var(--weight-semibold);
    }

    /* ── Tag Colors ── */
    .tag-bug      { background: var(--color-destructive-subtle); color: var(--color-destructive); }
    .tag-feature  { background: var(--color-primary-subtle);     color: var(--color-primary); }
    .tag-improve  { background: var(--color-success-subtle);     color: var(--color-success); }
    .tag-docs     { background: var(--color-info-subtle);        color: var(--color-info); }
    .tag-design   { background: oklch(0.92 0.08 330);            color: oklch(0.55 0.22 330); }
    .tag-infra    { background: var(--color-warning-subtle);     color: var(--color-warning); }

    /* ── Assignee avatar colors ── */
    .avatar-indigo { background: var(--palette-indigo-500); }
    .avatar-red    { background: var(--palette-red-400); }
    .avatar-green  { background: var(--palette-green-500); }
    .avatar-amber  { background: var(--palette-amber-500); }
    .avatar-blue   { background: var(--palette-blue-500); }

    /* ── Priority dot ── */
    .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .kb-header { padding: var(--space-3) var(--space-4); }
      .kb-toolbar { padding: var(--space-2) var(--space-4); }
      .kb-stats { padding: var(--space-2) var(--space-4); gap: var(--space-3); }
      .kb-board { padding: var(--space-3) var(--space-4); }
      .kb-column { flex: 0 0 280px; min-width: 280px; }
    }
  </style>

  <!-- Loom Core -->
  <script src="../registry/core/loom-core.js" data-manual></script>
</head>

<body l-cloak>

<div l-data="kanbanBoard">

  <!-- ══════ HEADER ══════ -->
  <header class="kb-header">
    <div class="kb-logo">
      <div class="kb-logo-icon">L</div>
      <span class="kb-logo-text">Loom Board</span>
    </div>
    <span class="kb-project-name">Loom UI Framework</span>
    <div class="kb-header-spacer"></div>

    <!-- Team Avatars -->
    <div class="kb-team">
      <template l-for="(member, mi) in team">
        <div data-ui="avatar" data-size="sm" :title="member.name">
          <div data-part="fallback" :class="member.color">
            <span l-text="member.initials"></span>
          </div>
        </div>
      </template>
    </div>

    <button data-ui="button" data-variant="primary" data-size="sm" @click="openQuickAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Card
    </button>
  </header>

  <!-- ══════ TOOLBAR ══════ -->
  <div class="kb-toolbar">
    <span class="kb-toolbar-label">Filters</span>

    <div class="kb-search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input data-ui="input" placeholder="Search cards..." l-model="searchQuery">
    </div>

    <select data-ui="select" class="kb-filter-select" l-model="filterAssignee">
      <option value="">All Assignees</option>
      <template l-for="(member, fi) in team">
        <option :value="member.name" l-text="member.name"></option>
      </template>
    </select>

    <select data-ui="select" class="kb-filter-select" l-model="filterPriority">
      <option value="">All Priorities</option>
      <option value="Critical">Critical</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <select data-ui="select" class="kb-filter-select" l-model="filterTag">
      <option value="">All Tags</option>
      <option value="Bug">Bug</option>
      <option value="Feature">Feature</option>
      <option value="Improvement">Improvement</option>
      <option value="Docs">Docs</option>
      <option value="Design">Design</option>
      <option value="Infra">Infra</option>
    </select>

    <template l-if="hasActiveFilters()">
      <button data-ui="button" data-variant="ghost" data-size="sm" @click="clearFilters()">

      { id: 3,  column: 'backlog', title: 'Fix badge overflow on mobile',     description: 'Badge text truncates incorrectly when container is narrow on small screens.',                priority: 'Low',    assignee: 'Carol Davis',  due: '',           tags: ['Bug'],                   comments: [],                                                                                       activity: [{ who: 'Carol Davis', action: 'created this card', when: 'Mar 23' }] },

      { id: 5,  column: 'in-progress', title: 'Implement toast notification system', description: 'Build a stacking toast system with auto-dismiss, pause on hover, and swipe to dismiss.', priority: 'Critical', assignee: 'Bob Martinez', due: '2026-04-02', tags: ['Feature'],               comments: [{ author: 'Alice Chen', text: 'Make sure to handle accessibility for screen readers.', time: '1 day ago' }, { author: 'Bob Martinez', text: 'Good point, will add aria-live region.', time: '5 hours ago' }], activity: [{ who: 'Bob Martinez', action: 'created this card', when: 'Mar 18' }, { who: 'Bob Martinez', action: 'moved to In Progress', when: 'Mar 25' }] },

      { id: 7,  column: 'in-progress', title: 'Table component primitives',         description: 'Build sortable, filterable table with sticky headers and row selection.',                  priority: 'High',     assignee: 'Dan Wilson',   due: '2026-04-08', tags: ['Feature'],               comments: [{ author: 'Eva Park', text: 'Can we add virtual scrolling for large datasets?', time: '3 hours ago' }], activity: [{ who: 'Dan Wilson', action: 'created this card', when: 'Mar 20' }, { who: 'Dan Wilson', action: 'moved to In Progress', when: 'Mar 27' }] },

      // Review
      { id: 9,  column: 'review', title: 'Dropdown menu component',             description: 'Fully accessible dropdown with keyboard navigation, submenus, and focus trapping.',        priority: 'High',   assignee: 'Eva Park',     due: '2026-04-03', tags: ['Feature'],                  comments: [{ author: 'Alice Chen', text: 'Looks great! Minor comment on the blur handler.', time: '1 hour ago' }], activity: [{ who: 'Eva Park', action: 'created this card', when: 'Mar 15' }, { who: 'Eva Park', action: 'moved to Review', when: 'Mar 28' }] },
      { id: 10, column: 'review', title: 'Update spacing scale documentation',  description: 'Add visual examples and usage guidance for the 4px base spacing system.',                  priority: 'Medium', assignee: 'Carol Davis',  due: '2026-04-06', tags: ['Docs', 'Design'],          comments: [],                                                                                       activity: [{ who: 'Carol Davis', action: 'created this card', when: 'Mar 17' }, { who: 'Carol Davis', action: 'moved to Review', when: 'Mar 29' }] },
      { id: 11, column: 'review', title: 'Avatar component image loading',      description: 'Add lazy loading, error fallback, and skeleton placeholder for avatar images.',            priority: 'Medium', assignee: 'Bob Martinez', due: '2026-04-04', tags: ['Improvement'],             comments: [],                                                                                       activity: [{ who: 'Bob Martinez', action: 'created this card', when: 'Mar 16' }, { who: 'Bob Martinez', action: 'moved to Review', when: 'Mar 29' }] },

      // Done
      { id: 12, column: 'done', title: 'Set up CI/CD pipeline',           description: 'Configure automated testing, linting, and deployment for the component library.',          priority: 'Critical', assignee: 'Alice Chen',   due: '2026-03-20', tags: ['Infra'],                 comments: [{ author: 'Dan Wilson', text: 'Pipeline runs are blazing fast. Nice work!', time: '5 days ago' }], activity: [{ who: 'Alice Chen', action: 'created this card', when: 'Mar 10' }, { who: 'Alice Chen', action: 'completed this card', when: 'Mar 20' }] },
      { id: 13, column: 'done', title: 'Button component with variants',  description: 'Primary, secondary, destructive, ghost, outline, and link button variants.',               priority: 'High',     assignee: 'Dan Wilson',   due: '2026-03-18', tags: ['Feature'],               comments: [],                                                                                       activity: [{ who: 'Dan Wilson', action: 'created this card', when: 'Mar 8' }, { who: 'Dan Wilson', action: 'completed this card', when: 'Mar 18' }] },
      { id: 14, column: 'done', title: 'Input and form field primitives', description: 'Text input, textarea, select with sizes, states, and input groups.',                        priority: 'High',     assignee: 'Carol Davis',  due: '2026-03-22', tags: ['Feature'],               comments: [],                                                                                       activity: [{ who: 'Carol Davis', action: 'created this card', when: 'Mar 12' }, { who: 'Carol Davis', action: 'completed this card', when: 'Mar 22' }] },
      { id: 15, column: 'done', title: 'Fix color contrast in badges',   description: 'Ensure all badge color combinations meet WCAG AA contrast requirements.',                   priority: 'Medium',   assignee: 'Eva Park',     due: '2026-03-25', tags: ['Bug', 'Design'],         comments: [],                                                                                       activity: [{ who: 'Eva Park', action: 'created this card', when: 'Mar 14' }, { who: 'Eva Park', action: 'completed this card', when: 'Mar 25' }] }
    ],

    // ── Filters ──
    searchQuery: '',
    filterAssignee: '',
    filterPriority: '',
    filterTag: '',

    // ── UI State ──
    editingCardId: null,
    addingToColumn: null,
    detailCard: null,
    newComment: '',
    newCard: {
      title: '',
      description: '',
      priority: 'Medium',
      assignee: 'Alice Chen',
      tags: []
    },

    // ── Computed helpers ──
    allCards: function() {
      var self = this;
      return self.cards.filter(function(c) {
        return self._matchesFilters(c);
      });
    },

    filteredCards: function(columnId) {
      var self = this;
      return self.cards.filter(function(c) {
        return c.column === columnId && self._matchesFilters(c);
      });
    },

    _matchesFilters: function(card) {
      var self = this;
      if (self.searchQuery) {
        var q = self.searchQuery.toLowerCase();
        var inTitle = card.title.toLowerCase().indexOf(q) !== -1;
        var inDesc  = card.description.toLowerCase().indexOf(q) !== -1;
        var inTags  = card.tags.some(function(t){ return t.toLowerCase().indexOf(q) !== -1; });
        if (!inTitle && !inDesc && !inTags) return false;
      }
      if (self.filterAssignee && card.assignee !== self.filterAssignee) return false;
      if (self.filterPriority && card.priority !== self.filterPriority) return false;
      if (self.filterTag && card.tags.indexOf(self.filterTag) === -1) return false;
      return true;
    },

    hasActiveFilters: function() {
      return this.searchQuery || this.filterAssignee || this.filterPriority || this.filterTag;
    },

    clearFilters: function() {
      this.searchQuery = '';
      this.filterAssignee = '';
      this.filterPriority = '';
      this.filterTag = '';
    },

    completionPct: function() {
      var total = this.cards.length;
      if (total === 0) return 0;
      var done = this.cards.filter(function(c) { return c.column === 'done'; }).length;
      return Math.round((done / total) * 100);
    },

    // ── Column helpers ──
    getColumnIndex: function(colId) {
      for (var i = 0; i < this.columns.length; i++) {
        if (this.columns[i].id === colId) return i;
      }
      return -1;
    },

    getColumnTitle: function(colId) {
      for (var i = 0; i < this.columns.length; i++) {
        if (this.columns[i].id === colId) return this.columns[i].title;
      }
      return '';
    },

    // ── Card actions ──
    moveCard: function(card, direction) {
      var idx = this.getColumnIndex(card.column);
      var newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= this.columns.length) return;
      var newCol = this.columns[newIdx].id;
      var oldCol = card.column;

      // Mutate and reassign for reactivity
      var updated = this.cards.map(function(c) {
        if (c.id === card.id) {
          var clone = Object.assign({}, c);
          clone.tags = c.tags.slice();
          clone.comments = (c.comments || []).slice();
          clone.activity = (c.activity || []).slice();
          clone.column = newCol;
          clone.activity.push({
            who: c.assignee.split(' ')[0],
            action: 'moved from ' + oldCol + ' to ' + newCol,
            when: 'Just now'
          });
          return clone;
        }
        return c;
      });
      this.cards = updated;
    },

    // ── Inline editing ──
    startEditing: function(card) {
      this.editingCardId = card.id;
    },

    finishEditing: function(card, event) {
      var newTitle = event.target.value.trim();
      if (newTitle && newTitle !== card.title) {
        this.cards = this.cards.map(function(c) {
          if (c.id === card.id) {
            var clone = Object.assign({}, c);
            clone.tags = c.tags.slice();
            clone.comments = (c.comments || []).slice();
            clone.activity = (c.activity || []).slice();
            clone.title = newTitle;
            return clone;
          }
          return c;
        });
      }
      this.editingCardId = null;
    },

    cancelEditing: function() {
      this.editingCardId = null;
    },

    // ── Add card ──
    startAdding: function(colId) {
      this.addingToColumn = colId;
      this.newCard = {
        title: '',
        description: '',
        priority: 'Medium',
        assignee: this.team[0].name,
        tags: []
      };
    },

    cancelAdding: function() {
      this.addingToColumn = null;
    },

    toggleNewTag: function(tag, event) {
      var tags = this.newCard.tags.slice();
      var idx = tags.indexOf(tag);
      if (event.target.checked && idx === -1) {
        tags.push(tag);
      } else if (!event.target.checked && idx !== -1) {
        tags.splice(idx, 1);
      }
      this.newCard = Object.assign({}, this.newCard, { tags: tags });
    },

    submitCard: function(colId) {
      if (!this.newCard.title.trim()) return;

      var card = {
        id: nextId++,
        column: colId,
        title: this.newCard.title.trim(),
        description: this.newCard.description.trim(),
        priority: this.newCard.priority,
        assignee: this.newCard.assignee,
        due: '',
        tags: this.newCard.tags.slice(),
        comments: [],
        activity: [{ who: this.newCard.assignee.split(' ')[0], action: 'created this card', when: 'Just now' }]
      };

      this.cards = this.cards.concat([card]);
      this.addingToColumn = null;
    },

    openQuickAdd: function() {
      this.startAdding('backlog');
    },

    // ── Detail overlay ──
    openDetail: function(card) {
      if (this.editingCardId) return;
      // Deep clone for display
      this.detailCard = JSON.parse(JSON.stringify(card));
    },

    closeDetail: function() {
      this.detailCard = null;
      this.newComment = '';
    },

    addComment: function() {
      if (!this.newComment.trim() || !this.detailCard) return;

      var commentObj = {
        author: this.team[0].name,
        text: this.newComment.trim(),
        time: 'Just now'
      };

      // Update the detail view
      var updatedDetail = Object.assign({}, this.detailCard);
      updatedDetail.comments = (this.detailCard.comments || []).concat([commentObj]);
      updatedDetail.tags = this.detailCard.tags.slice();
      updatedDetail.activity = (this.detailCard.activity || []).slice();
      this.detailCard = updatedDetail;

      // Also update the backing card
      var cardId = this.detailCard.id;
      this.cards = this.cards.map(function(c) {
        if (c.id === cardId) {
          var clone = Object.assign({}, c);
          clone.tags = c.tags.slice();
          clone.comments = (c.comments || []).concat([commentObj]);
          clone.activity = (c.activity || []).slice();
          return clone;
        }
        return c;
      });

      this.newComment = '';
    },

    // ── Display helpers ──
    priorityColor: function(p) {
      switch(p) {
        case 'Critical': return 'var(--palette-red-500)';
        case 'High':     return 'var(--palette-amber-500)';
        case 'Medium':   return 'var(--palette-blue-400)';
        case 'Low':      return 'var(--palette-gray-400)';
        default:         return 'var(--palette-gray-300)';
      }
    },

    priorityVariant: function(p) {
      switch(p) {
        case 'Critical': return 'destructive';
        case 'High':     return 'warning';
        case 'Medium':   return 'primary';
        case 'Low':      return 'secondary';
        default:         return 'default';
      }
    },

    tagClass: function(tag) {
      switch(tag) {
        case 'Bug':         return 'tag-bug';
        case 'Feature':     return 'tag-feature';
        case 'Improvement': return 'tag-improve';
        case 'Docs':        return 'tag-docs';
        case 'Design':      return 'tag-design';
        case 'Infra':       return 'tag-infra';
        default:            return '';
      }
    },

    getAssigneeColor: function(name) {
      for (var i = 0; i < this.team.length; i++) {
        if (this.team[i].name === name) return this.team[i].color;
      }
      return 'avatar-indigo';
    },

    getInitials: function(name) {
      if (!name) return '??';
      var parts = name.split(' ');
      return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
    },

    formatDue: function(dateStr) {
      if (!dateStr) return '';
      var parts = dateStr.split('-');
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10);
    },

    isOverdue: function(dateStr) {
      if (!dateStr) return false;
      var due = new Date(dateStr);
      return due < new Date();
    }
  };
});

Loom.start();
</script>
