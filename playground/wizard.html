<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loom UI — Multi-Step Form Wizard</title>

  <!-- Tokens -->
  <link rel="stylesheet" href="../registry/tokens/palette.css">
  <link rel="stylesheet" href="../registry/tokens/spacing.css">
  <link rel="stylesheet" href="../registry/tokens/typography.css">
  <link rel="stylesheet" href="../registry/tokens/effects.css">
  <link rel="stylesheet" href="../registry/tokens/motion.css">
  <link rel="stylesheet" href="../registry/tokens/semantic.css">
  <link rel="stylesheet" href="../registry/tokens/aliases.css">

  <!-- Base -->
  <link rel="stylesheet" href="../registry/base/reset.css">
  <link rel="stylesheet" href="../registry/base/prose.css">

  <!-- Theme -->
  <link rel="stylesheet" href="../registry/themes/default.css">

  <!-- Primitives -->
  <link rel="stylesheet" href="../registry/primitives/button/button.css">
  <link rel="stylesheet" href="../registry/primitives/input/input.css">
  <link rel="stylesheet" href="../registry/primitives/badge/badge.css">
  <link rel="stylesheet" href="../registry/primitives/card/card.css">
  <link rel="stylesheet" href="../registry/primitives/separator/separator.css">
  <link rel="stylesheet" href="../registry/primitives/checkbox/checkbox.css">
  <link rel="stylesheet" href="../registry/primitives/radio/radio.css">
  <link rel="stylesheet" href="../registry/primitives/switch/switch.css">
  <link rel="stylesheet" href="../registry/primitives/select/select.css">
  <link rel="stylesheet" href="../registry/primitives/textarea/textarea.css">
  <link rel="stylesheet" href="../registry/primitives/label/label.css">
  <link rel="stylesheet" href="../registry/primitives/spinner/spinner.css">

  <style>
    /* ── Page Layout ── */
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg,
        oklch(0.96 0.04 264) 0%,
        oklch(0.98 0.01 264) 40%,
        oklch(0.96 0.03 155) 100%
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-6) var(--space-4);
      font-family: var(--font-sans);
    }

    [l-cloak] { display: none !important; }

    /* ── Main Layout ── */
    .wizard-layout {
      display: flex;
      gap: var(--space-6);
      width: 100%;
      max-width: 1100px;
      align-items: flex-start;
    }

    .wizard-main {
      flex: 1;
      min-width: 0;
    }

    /* ── Header ── */
    .wizard-hero {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .wizard-hero h1 {
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: var(--color-fg);
      margin: 0 0 var(--space-2);
      letter-spacing: -0.02em;
    }

    .wizard-hero p {
      font-size: var(--text-base);
      color: var(--color-fg-muted);
      margin: 0;
    }

    /* ── Progress Bar (Overall) ── */
    .progress-container {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }

    .progress-label {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-fg-muted);
      white-space: nowrap;
    }

    .progress-track {
      flex: 1;
      height: 8px;
      background: var(--color-bg-muted);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), oklch(0.60 0.18 155));
      border-radius: var(--radius-full);
      transition: width 0.4s var(--ease-default);
    }

    .progress-pct {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-primary);
      min-width: 40px;
      text-align: right;
    }

    /* ── Step Indicator ── */
    .stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: var(--space-6);
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 0;
      cursor: pointer;
    }

    .step-circle {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      border: 2px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-fg-muted);
      transition: all 0.3s var(--ease-default);
      position: relative;
    }

    .step-circle.active {
      border-color: var(--color-primary);
      background: var(--color-primary);
      color: white;
      box-shadow: 0 0 0 4px var(--color-primary-subtle);
    }

    .step-circle.completed {
      border-color: oklch(0.60 0.18 155);
      background: oklch(0.60 0.18 155);
      color: white;
    }

    .step-label {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      margin-top: var(--space-1);
      text-align: center;
      font-weight: var(--weight-medium);
      transition: color 0.3s var(--ease-default);
    }

    .step-label.active {
      color: var(--color-primary);
    }

    .step-label.completed {
      color: oklch(0.60 0.18 155);
    }

    .step-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }

    .step-connector {
      width: 60px;
      height: 2px;
      background: var(--color-border);
      margin: 0 var(--space-1);
      margin-bottom: 20px;
      transition: background 0.3s var(--ease-default);
    }

    .step-connector.completed {
      background: oklch(0.60 0.18 155);
    }

    /* ── Card Container ── */
    .wizard-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      background: var(--color-bg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .wizard-card-body {
      padding: var(--space-8);
      min-height: 420px;
      position: relative;
    }

    .wizard-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-8);
      border-top: 1px solid var(--color-border);
      background: var(--color-bg-subtle);
    }

    /* ── Step Transitions ── */
    .step-panel {
      animation: stepFadeIn 0.35s var(--ease-out) forwards;
    }

    @keyframes stepFadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Step Title ── */
    .step-title {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-fg);
      margin: 0 0 var(--space-1);
    }

    .step-subtitle {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      margin: 0 0 var(--space-6);
    }

    /* ── Form Layout ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-error {
      font-size: var(--text-xs);
      color: var(--color-destructive);
      margin-top: var(--space-0h);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .form-hint {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      margin-top: var(--space-0h);
    }

    /* ── Password Strength ── */
    .strength-bar {
      display: flex;
      gap: var(--space-1);
      margin-top: var(--space-2);
    }

    .strength-segment {
      flex: 1;
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--color-bg-muted);
      transition: background 0.3s var(--ease-default);
    }

    .strength-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      margin-top: var(--space-1);
      transition: color 0.3s var(--ease-default);
    }

    /* ── Role Cards ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
    }

    .role-card {
      position: relative;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s var(--ease-default);
      background: var(--color-bg);
    }

    .role-card:hover {
      border-color: var(--color-border-strong);
      background: var(--color-bg-subtle);
    }

    .role-card.selected {
      border-color: var(--color-primary);
      background: var(--color-primary-subtle);
    }

    .role-icon {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-2);
    }

    .role-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-fg);
    }

    .role-card input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* ── Conditional Fields ── */
    .conditional-fields {
      margin-top: var(--space-4);
      padding: var(--space-4);
      background: var(--color-bg-subtle);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
    }

    .conditional-title {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
      margin: 0 0 var(--space-3);
    }

    /* ── Switch Row ── */
    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) 0;
    }

    .switch-info {
      display: flex;
      flex-direction: column;
      gap: var(--space-0h);
    }

    .switch-title {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-fg);
    }

    .switch-desc {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
    }

    /* ── Pricing Cards ── */
    .pricing-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    .pricing-toggle-label {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-fg-muted);
    }

    .pricing-toggle-label.active {
      color: var(--color-fg);
    }

    .pricing-save {
      font-size: var(--text-xs);
      color: oklch(0.60 0.18 155);
      font-weight: var(--weight-semibold);
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }

    .pricing-card {
      border: 2px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      text-align: center;
      cursor: pointer;
      transition: all 0.25s var(--ease-default);
      background: var(--color-bg);
      position: relative;
    }

    .pricing-card:hover {
      border-color: var(--color-border-strong);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .pricing-card.selected {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px var(--color-primary-subtle), var(--shadow-md);
      transform: translateY(-2px);
    }

    .pricing-card.popular {
      position: relative;
    }

    .pricing-popular-tag {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
    }

    .pricing-name {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--color-fg);
      margin: 0 0 var(--space-2);
    }

    .pricing-amount {
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: var(--color-fg);
      margin: 0 0 var(--space-1);
    }

    .pricing-amount span {
      font-size: var(--text-sm);
      font-weight: var(--weight-normal);
      color: var(--color-fg-muted);
    }

    .pricing-desc {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      margin: 0 0 var(--space-4);
    }

    .pricing-features {
      list-style: none;
      padding: 0;
      margin: 0;
      text-align: left;
    }

    .pricing-features li {
      font-size: var(--text-sm);
      color: var(--color-fg);
      padding: var(--space-1h) 0;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .pricing-features li::before {
      content: "\2713";
      color: oklch(0.60 0.18 155);
      font-weight: var(--weight-bold);
      flex-shrink: 0;
    }

    .pricing-check {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
    }

    /* ── Review Section ── */
    .review-section {
      margin-bottom: var(--space-5);
    }

    .review-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-3);
    }

    .review-title {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-fg);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .review-edit {
      font-size: var(--text-xs);
      color: var(--color-primary);
      cursor: pointer;
      font-weight: var(--weight-medium);
      background: none;
      border: none;
      font-family: var(--font-sans);
    }

    .review-edit:hover {
      text-decoration: underline;
    }

    .review-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2) var(--space-6);
    }

    .review-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-0h);
    }

    .review-item-label {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      font-weight: var(--weight-medium);
    }

    .review-item-value {
      font-size: var(--text-sm);
      color: var(--color-fg);
    }

    .review-terms {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--color-bg-subtle);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      margin-top: var(--space-4);
    }

    .review-terms-text {
      font-size: var(--text-sm);
      color: var(--color-fg);
      line-height: var(--leading-normal);
    }

    /* ── Live Preview Sidebar ── */
    .preview-sidebar {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: var(--space-6);
    }

    .preview-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      background: var(--color-bg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .preview-header {
      background: linear-gradient(135deg, var(--color-primary), oklch(0.45 0.20 264));
      padding: var(--space-6) var(--space-4);
      text-align: center;
      position: relative;
    }

    .preview-avatar {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.2);
      border: 3px solid rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: white;
      margin: 0 auto var(--space-3);
      backdrop-filter: blur(8px);
    }

    .preview-name {
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: white;
      margin: 0 0 var(--space-1);
    }

    .preview-email-text {
      font-size: var(--text-xs);
      color: rgba(255, 255, 255, 0.75);
      margin: 0;
    }

    .preview-body {
      padding: var(--space-4);
    }

    .preview-badges {
      display: flex;
      gap: var(--space-2);
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    .preview-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) 0;
      font-size: var(--text-xs);
    }

    .preview-detail-label {
      color: var(--color-fg-muted);
    }

    .preview-detail-value {
      color: var(--color-fg);
      font-weight: var(--weight-medium);
    }

    .preview-status {
      text-align: center;
      padding: var(--space-3);
      border-top: 1px solid var(--color-border);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
    }

    /* ── Success State ── */
    .success-container {
      text-align: center;
      padding: var(--space-8) var(--space-6);
    }

    .success-icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-full);
      background: oklch(0.96 0.04 155);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-3xl);
      margin: 0 auto var(--space-4);
      animation: successPop 0.5s var(--ease-bounce) forwards;
    }

    @keyframes successPop {
      from { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.15); }
      to { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-fg);
      margin: 0 0 var(--space-2);
    }

    .success-message {
      font-size: var(--text-base);
      color: var(--color-fg-muted);
      margin: 0 0 var(--space-6);
      line-height: var(--leading-relaxed);
    }

    /* ── Submitting State ── */
    .submitting-container {
      text-align: center;
      padding: var(--space-12) var(--space-6);
    }

    .submitting-text {
      font-size: var(--text-base);
      color: var(--color-fg-muted);
      margin-top: var(--space-4);
    }

    /* ── Footer ── */
    .wizard-footer {
      text-align: center;
      margin-top: var(--space-8);
      padding: var(--space-4);
    }

    .wizard-footer p {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      margin: 0;
      line-height: var(--leading-relaxed);
    }

    /* ── Checkbox Tools Grid ── */
    .tools-grid {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .preview-sidebar {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .role-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .pricing-grid {
        grid-template-columns: 1fr;
      }

      .review-grid {
        grid-template-columns: 1fr;
      }

      .wizard-card-body {
        padding: var(--space-5);
      }

      .wizard-card-footer {
        padding: var(--space-4) var(--space-5);
      }

      .step-connector {
        width: 30px;
      }

      .step-wrapper {
        min-width: 60px;
      }
    }

    @media (max-width: 480px) {
      .step-label {
        display: none;
      }

      .step-wrapper {
        min-width: auto;
      }
    }
  </style>
</head>

<body l-cloak>

  <!-- ════════════════ Wizard Root ════════════════ -->
  <div l-data="wizard" l-init="initWatchers()" @keydown.enter="handleEnter()" @keydown.escape="handleEscape()">

    <!-- Hero -->
    <div class="wizard-hero">
      <h1>Create Your Account</h1>
      <p>Set up your profile in just a few steps. It only takes a minute.</p>
    </div>

    <!-- Overall Form Progress -->
    <div class="progress-container" style="max-width: 1100px; width: 100%;">
      <span class="progress-label">Form progress</span>
      <div class="progress-track">
        <div class="progress-fill" :style="'width:' + getFormProgress() + '%'"></div>
      </div>
      <span class="progress-pct" l-text="getFormProgress() + '%'"></span>
    </div>

    <div class="wizard-layout">

      <!-- ──────── Main Column ──────── -->
      <div class="wizard-main">

        <!-- Step Indicator -->
        <div class="stepper">
          <!-- Step 1 -->
          <div class="step-wrapper">
            <div class="step-item" @click="goToStep(1)">
              <div class="step-circle"
                   :class="step > 1 ? 'completed' : (step === 1 ? 'active' : '')">
                <template l-if="step > 1"><span>&#10003;</span></template>
                <template l-if="step <= 1"><span>1</span></template>
              </div>
            </div>
            <div class="step-label" :class="step > 1 ? 'completed' : (step === 1 ? 'active' : '')">Personal</div>
          </div>

          <div class="step-connector" :class="step > 1 ? 'completed' : ''"></div>

          <!-- Step 2 -->
          <div class="step-wrapper">
            <div class="step-item" @click="goToStep(2)">
              <div class="step-circle"
                   :class="step > 2 ? 'completed' : (step === 2 ? 'active' : '')">
                <template l-if="step > 2"><span>&#10003;</span></template>
                <template l-if="step <= 2"><span>2</span></template>
              </div>
            </div>
            <div class="step-label" :class="step > 2 ? 'completed' : (step === 2 ? 'active' : '')">Preferences</div>
          </div>

          <div class="step-connector" :class="step > 2 ? 'completed' : ''"></div>

          <!-- Step 3 -->
          <div class="step-wrapper">
            <div class="step-item" @click="goToStep(3)">
              <div class="step-circle"
                   :class="step > 3 ? 'completed' : (step === 3 ? 'active' : '')">
                <template l-if="step > 3"><span>&#10003;</span></template>
                <template l-if="step <= 3"><span>3</span></template>
              </div>
            </div>
            <div class="step-label" :class="step > 3 ? 'completed' : (step === 3 ? 'active' : '')">Plan</div>
          </div>

          <div class="step-connector" :class="step > 3 ? 'completed' : ''"></div>

          <!-- Step 4 -->
          <div class="step-wrapper">
            <div class="step-item" @click="goToStep(4)">
              <div class="step-circle"
                   :class="step === 4 ? 'active' : ''">
                <span>4</span>
              </div>
            </div>
            <div class="step-label" :class="step === 4 ? 'active' : ''">Review</div>
          </div>
        </div>

        <!-- Wizard Card -->
        <div class="wizard-card">
          <div class="wizard-card-body">

            <!-- ═══════ STEP 1: Personal Information ═══════ -->
            <template l-if="step === 1 && !submitting && !submitted">
              <div class="step-panel">
                <h2 class="step-title">Personal Information</h2>
                <p class="step-subtitle">Tell us about yourself. Fields marked with * are required.</p>

                <div class="form-grid">
                  <!-- First Name -->
                  <div class="form-group">
                    <label data-ui="label" data-variant="required">
                      First Name <span data-part="indicator">*</span>
                    </label>
                    <input data-ui="input" type="text" placeholder="John"
                           l-model.trim="firstName"
                           :data-state="errors.firstName ? 'error' : ''">
                    <div class="form-error" l-show="errors.firstName" l-text="errors.firstName"></div>
                  </div>

                  <!-- Last Name -->
                  <div class="form-group">
                    <label data-ui="label" data-variant="required">
                      Last Name <span data-part="indicator">*</span>
                    </label>
                    <input data-ui="input" type="text" placeholder="Doe"
                           l-model.trim="lastName"
                           :data-state="errors.lastName ? 'error' : ''">
                    <div class="form-error" l-show="errors.lastName" l-text="errors.lastName"></div>
                  </div>

                  <!-- Email -->
                  <div class="form-group">
                    <label data-ui="label" data-variant="required">
                      Email Address <span data-part="indicator">*</span>
                    </label>
                    <input data-ui="input" type="email" placeholder="john@example.com"
                           l-model.trim="email"
                           :data-state="errors.email ? 'error' : ''">
                    <div class="form-error" l-show="errors.email" l-text="errors.email"></div>
                  </div>

                  <!-- Phone -->
                  <div class="form-group">
                    <label data-ui="label">Phone Number</label>
                    <input data-ui="input" type="tel" placeholder="+1 (555) 000-0000"
                           l-model.trim="phone">
                    <div class="form-hint">Optional. Used for account recovery.</div>
                  </div>

                  <!-- Password -->
                  <div class="form-group">
                    <label data-ui="label" data-variant="required">
                      Password <span data-part="indicator">*</span>
                    </label>
                    <input data-ui="input" type="password" placeholder="Min. 8 characters"
                           l-model="password"
                           :data-state="errors.password ? 'error' : ''">
                    <div class="form-error" l-show="errors.password" l-text="errors.password"></div>
                    <div l-show="password.length > 0">
                      <div class="strength-bar">
                        <div class="strength-segment" :style="'background:' + (passwordStrength >= 1 ? strengthColor : '')"></div>
                        <div class="strength-segment" :style="'background:' + (passwordStrength >= 2 ? strengthColor : '')"></div>
                        <div class="strength-segment" :style="'background:' + (passwordStrength >= 3 ? strengthColor : '')"></div>
                        <div class="strength-segment" :style="'background:' + (passwordStrength >= 4 ? strengthColor : '')"></div>
                      </div>
                      <div class="strength-label" :style="'color:' + strengthColor" l-text="strengthLabel"></div>
                    </div>
                  </div>

                  <!-- Confirm Password -->
                  <div class="form-group">
                    <label data-ui="label" data-variant="required">
                      Confirm Password <span data-part="indicator">*</span>
                    </label>
                    <input data-ui="input" type="password" placeholder="Re-enter password"
                           l-model="confirmPassword"
                           :data-state="errors.confirmPassword ? 'error' : ''">
                    <div class="form-error" l-show="errors.confirmPassword" l-text="errors.confirmPassword"></div>
                  </div>
                </div>
              </div>
            </template>

            <!-- ═══════ STEP 2: Preferences ═══════ -->
            <template l-if="step === 2 && !submitting && !submitted">
              <div class="step-panel">
                <h2 class="step-title">Your Preferences</h2>
                <p class="step-subtitle">Help us personalize your experience.</p>

                <!-- Role Selection -->
                <label data-ui="label" data-variant="required" style="margin-bottom: var(--space-3);">
                  What best describes your role? <span data-part="indicator">*</span>
                </label>
                <div class="role-grid">
                  <label class="role-card" :class="role === 'developer' ? 'selected' : ''"
                         @click="role = 'developer'">
                    <input type="radio" name="role" value="developer" l-model="role">
                    <div class="role-icon">&#128187;</div>
                    <div class="role-name">Developer</div>
                  </label>
                  <label class="role-card" :class="role === 'designer' ? 'selected' : ''"
                         @click="role = 'designer'">
                    <input type="radio" name="role" value="designer" l-model="role">
                    <div class="role-icon">&#127912;</div>
                    <div class="role-name">Designer</div>
                  </label>
                  <label class="role-card" :class="role === 'manager' ? 'selected' : ''"
                         @click="role = 'manager'">
                    <input type="radio" name="role" value="manager" l-model="role">
                    <div class="role-icon">&#128188;</div>
                    <div class="role-name">Manager</div>
                  </label>
                  <label class="role-card" :class="role === 'other' ? 'selected' : ''"
                         @click="role = 'other'">
                    <input type="radio" name="role" value="other" l-model="role">
                    <div class="role-icon">&#9733;</div>
                    <div class="role-name">Other</div>
                  </label>
                </div>
                <div class="form-error" l-show="errors.role" l-text="errors.role" style="margin-top: var(--space-2);"></div>

                <!-- Developer Fields -->
                <div class="conditional-fields" l-show="role === 'developer'">
                  <div class="conditional-title">Developer Details</div>
                  <div class="form-grid">
                    <div class="form-group">
                      <label data-ui="label">Favorite Language</label>
                      <select data-ui="select" l-model="favLanguage">
                        <option value="">Select a language</option>
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="python">Python</option>
                        <option value="rust">Rust</option>
                        <option value="go">Go</option>
                        <option value="java">Java</option>
                        <option value="csharp">C#</option>
                        <option value="other">Other</option>
                      </select>
                    </div>
                    <div class="form-group">
                      <label data-ui="label">Years of Experience</label>
                      <input data-ui="input" type="number" placeholder="e.g. 5" min="0" max="50"
                             l-model.number="yearsExperience">
                    </div>
                  </div>
                </div>

                <!-- Designer Fields -->
                <div class="conditional-fields" l-show="role === 'designer'">
                  <div class="conditional-title">Design Tools</div>
                  <div class="tools-grid">
                    <label data-ui="checkbox-label">
                      <input data-ui="checkbox" type="checkbox" l-model="toolFigma">
                      Figma
                    </label>
                    <label data-ui="checkbox-label">
                      <input data-ui="checkbox" type="checkbox" l-model="toolSketch">
                      Sketch
                    </label>
                    <label data-ui="checkbox-label">
                      <input data-ui="checkbox" type="checkbox" l-model="toolAdobeXD">
                      Adobe XD
                    </label>
                  </div>
                </div>

                <!-- Manager Fields -->
                <div class="conditional-fields" l-show="role === 'manager'">
                  <div class="conditional-title">Team Information</div>
                  <div class="form-group">
                    <label data-ui="label">Team Size</label>
                    <input data-ui="input" type="number" placeholder="Number of direct reports" min="1" max="500"
                           l-model.number="teamSize">
                  </div>
                </div>

                <hr data-ui="separator" style="margin: var(--space-5) 0;">

                <!-- Newsletter Switch -->
                <div class="switch-row">
                  <div class="switch-info">
                    <span class="switch-title">Subscribe to Newsletter</span>
                    <span class="switch-desc">Receive weekly updates, tips, and product news.</span>
                  </div>
                  <button data-ui="switch" role="switch"
                          l-model="newsletter">
                    <span data-part="thumb"></span>
                  </button>
                </div>

                <hr data-ui="separator" style="margin: var(--space-3) 0;">

                <!-- Theme Preference Switch -->
                <div class="switch-row">
                  <div class="switch-info">
                    <span class="switch-title">Dark Mode</span>
                    <span class="switch-desc">Use dark theme for the application interface.</span>
                  </div>
                  <button data-ui="switch" role="switch"
                          l-model="darkMode">
                    <span data-part="thumb"></span>
                  </button>
                </div>
              </div>
            </template>

            <!-- ═══════ STEP 3: Plan Selection ═══════ -->
            <template l-if="step === 3 && !submitting && !submitted">
              <div class="step-panel">
                <h2 class="step-title">Choose Your Plan</h2>
                <p class="step-subtitle">Select the plan that fits your needs. Upgrade or downgrade anytime.</p>

                <!-- Annual / Monthly Toggle -->
                <div class="pricing-toggle">
                  <span class="pricing-toggle-label" :class="!annual ? 'active' : ''">Monthly</span>
                  <button data-ui="switch" role="switch"
                          l-model="annual">
                    <span data-part="thumb"></span>
                  </button>
                  <span class="pricing-toggle-label" :class="annual ? 'active' : ''">Annual</span>
                  <span class="pricing-save" l-show="annual">Save 20%</span>
                </div>

                <!-- Pricing Cards -->
                <div class="pricing-grid">

                  <!-- Free Plan -->
                  <div class="pricing-card" :class="plan === 'free' ? 'selected' : ''"
                       @click="plan = 'free'">
                    <div class="pricing-check" l-show="plan === 'free'">&#10003;</div>
                    <h3 class="pricing-name">Free</h3>
                    <div class="pricing-amount">$0<span>/mo</span></div>
                    <p class="pricing-desc">Perfect for getting started</p>
                    <hr data-ui="separator" style="margin: var(--space-3) 0;">
                    <ul class="pricing-features">
                      <li>1 project</li>
                      <li>Basic components</li>
                      <li>Community support</li>
                      <li>1 GB storage</li>
                    </ul>
                  </div>

                  <!-- Pro Plan -->
                  <div class="pricing-card popular" :class="plan === 'pro' ? 'selected' : ''"
                       @click="plan = 'pro'">
                    <div class="pricing-popular-tag">
                      <span data-ui="badge" data-variant="primary" data-size="lg">Most Popular</span>
                    </div>
                    <div class="pricing-check" l-show="plan === 'pro'">&#10003;</div>
                    <h3 class="pricing-name">Pro</h3>
                    <div class="pricing-amount" l-text="'$' + getProPrice() + '/mo'"></div>
                    <p class="pricing-desc" l-text="annual ? 'Billed annually at $' + (getProPrice() * 12) : 'Billed monthly'"></p>
                    <hr data-ui="separator" style="margin: var(--space-3) 0;">
                    <ul class="pricing-features">
                      <li>Unlimited projects</li>
                      <li>All components + recipes</li>
                      <li>Priority support</li>
                      <li>25 GB storage</li>
                      <li>Custom themes</li>
                    </ul>
                  </div>

                  <!-- Enterprise Plan -->
                  <div class="pricing-card" :class="plan === 'enterprise' ? 'selected' : ''"
                       @click="plan = 'enterprise'">
                    <div class="pricing-check" l-show="plan === 'enterprise'">&#10003;</div>
                    <h3 class="pricing-name">Enterprise</h3>
                    <div class="pricing-amount" l-text="'$' + getEnterprisePrice() + '/mo'"></div>
                    <p class="pricing-desc" l-text="annual ? 'Billed annually at $' + (getEnterprisePrice() * 12) : 'Billed monthly'"></p>
                    <hr data-ui="separator" style="margin: var(--space-3) 0;">
                    <ul class="pricing-features">
                      <li>Everything in Pro</li>
                      <li>SSO &amp; SAML</li>
                      <li>Dedicated support</li>
                      <li>Unlimited storage</li>
                      <li>SLA guarantee</li>
                      <li>Custom integrations</li>
                    </ul>
                  </div>
                </div>
                <div class="form-error" l-show="errors.plan" l-text="errors.plan" style="margin-top: var(--space-3); text-align: center;"></div>
              </div>
            </template>

            <!-- ═══════ STEP 4: Review & Submit ═══════ -->
            <template l-if="step === 4 && !submitting && !submitted">
              <div class="step-panel">
                <h2 class="step-title">Review &amp; Submit</h2>
                <p class="step-subtitle">Please review your information before creating your account.</p>

                <!-- Personal Info Review -->
                <div class="review-section">
                  <div class="review-header">
                    <span class="review-title">Personal Information</span>
                    <button class="review-edit" @click="goToStep(1)">Edit</button>
                  </div>
                  <div class="review-grid">
                    <div class="review-item">
                      <span class="review-item-label">Full Name</span>
                      <span class="review-item-value" l-text="firstName + ' ' + lastName"></span>
                    </div>
                    <div class="review-item">
                      <span class="review-item-label">Email</span>
                      <span class="review-item-value" l-text="email"></span>
                    </div>
                    <div class="review-item">
                      <span class="review-item-label">Phone</span>
                      <span class="review-item-value" l-text="phone || 'Not provided'"></span>
                    </div>
                    <div class="review-item">
                      <span class="review-item-label">Password</span>
                      <span class="review-item-value">&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;</span>
                    </div>
                  </div>
                </div>

                <hr data-ui="separator" style="margin: var(--space-4) 0;">

                <!-- Preferences Review -->
                <div class="review-section">
                  <div class="review-header">
                    <span class="review-title">Preferences</span>
                    <button class="review-edit" @click="goToStep(2)">Edit</button>
                  </div>
                  <div class="review-grid">
                    <div class="review-item">
                      <span class="review-item-label">Role</span>
                      <span class="review-item-value" l-text="getRoleDisplay()"></span>
                    </div>
                    <div class="review-item">
                      <span class="review-item-label">Details</span>
                      <span class="review-item-value" l-text="getRoleDetails()"></span>
                    </div>
                    <div class="review-item">
                      <span class="review-item-label">Newsletter</span>
                      <span class="review-item-value" l-text="newsletter ? 'Subscribed' : 'Not subscribed'"></span>
                    </div>
                    <div class="review-item">
                      <span class="review-item-label">Theme</span>
                      <span class="review-item-value" l-text="darkMode ? 'Dark mode' : 'Light mode'"></span>
                    </div>
                  </div>
                </div>

                <hr data-ui="separator" style="margin: var(--space-4) 0;">

                <!-- Plan Review -->
                <div class="review-section">
                  <div class="review-header">
                    <span class="review-title">Selected Plan</span>
                    <button class="review-edit" @click="goToStep(3)">Edit</button>
                  </div>
                  <div class="review-grid">
                    <div class="review-item">
                      <span class="review-item-label">Plan</span>
                      <span class="review-item-value" l-text="getPlanDisplay()"></span>
                    </div>
                    <div class="review-item">
                      <span class="review-item-label">Billing</span>
                      <span class="review-item-value" l-text="getBillingDisplay()"></span>
                    </div>
                  </div>
                </div>

                <!-- Terms -->
                <div class="review-terms">
                  <input data-ui="checkbox" type="checkbox" l-model="termsAccepted" style="margin-top: 2px;">
                  <div class="review-terms-text">
                    I agree to the <strong>Terms of Service</strong> and <strong>Privacy Policy</strong>.
                    I understand that my data will be handled according to the privacy policy.
                  </div>
                </div>
                <div class="form-error" l-show="errors.terms" l-text="errors.terms" style="margin-top: var(--space-2);"></div>
              </div>
            </template>

            <!-- ═══════ Submitting State ═══════ -->
            <template l-if="submitting">
              <div class="submitting-container">
                <div data-ui="spinner" data-size="xl" style="margin: 0 auto;"></div>
                <p class="submitting-text">Creating your account...</p>
              </div>
            </template>

            <!-- ═══════ Success State ═══════ -->
            <template l-if="submitted">
              <div class="success-container step-panel">
                <div class="success-icon">&#10003;</div>
                <h2 class="success-title">Welcome aboard!</h2>
                <p class="success-message">
                  Your account has been created successfully. We sent a confirmation email to
                  <strong l-text="email"></strong>. Check your inbox to verify your account.
                </p>
                <div style="display: flex; gap: var(--space-3); justify-content: center;">
                  <button data-ui="button" data-variant="primary" data-size="lg"
                          @click="resetForm()">
                    Start Over
                  </button>
                  <button data-ui="button" data-variant="outline" data-size="lg">
                    Go to Dashboard
                  </button>
                </div>
              </div>
            </template>

          </div>

          <!-- Card Footer with Navigation -->
          <div class="wizard-card-footer" l-show="!submitting && !submitted">
            <button data-ui="button" data-variant="outline"
                    @click="prevStep()"
                    l-show="step > 1">
              &#8592; Back
            </button>
            <span l-show="step === 1"></span>

            <div style="display: flex; gap: var(--space-3); align-items: center;">
              <span style="font-size: var(--text-xs); color: var(--color-fg-muted);"
                    l-text="'Step ' + step + ' of 4'"></span>

              <template l-if="step < 4">
                <button data-ui="button" data-variant="primary"
                        @click="nextStep()">
                  Continue &#8594;
                </button>
              </template>
              <template l-if="step === 4">
                <button data-ui="button" data-variant="primary" data-size="lg"
                        @click="submitForm()"
                        :data-state="!termsAccepted ? 'disabled' : ''"
                        :disabled="!termsAccepted">
                  Create Account
                </button>
              </template>
            </div>
          </div>
        </div>

      </div>

      <!-- ──────── Live Preview Sidebar ──────── -->
      <div class="preview-sidebar" l-show="!submitted">
        <div class="preview-card">
          <div class="preview-header">
            <div class="preview-avatar" l-text="getInitials()"></div>
            <p class="preview-name" l-text="(firstName || lastName) ? (firstName + ' ' + lastName).trim() : 'Your Name'"></p>
            <p class="preview-email-text" l-text="email || 'email@example.com'"></p>
          </div>
          <div class="preview-body">
            <div class="preview-badges">
              <template l-if="role">
                <span data-ui="badge" data-variant="primary" l-text="getRoleDisplay()"></span>
              </template>
              <template l-if="plan">
                <span data-ui="badge" :data-variant="plan === 'enterprise' ? 'warning' : (plan === 'pro' ? 'success' : 'secondary')"
                      l-text="getPlanDisplay()"></span>
              </template>
            </div>
            <hr data-ui="separator" style="margin: var(--space-3) 0;">
            <div class="preview-detail">
              <span class="preview-detail-label">Phone</span>
              <span class="preview-detail-value" l-text="phone || '---'"></span>
            </div>
            <div class="preview-detail">
              <span class="preview-detail-label">Newsletter</span>
              <span class="preview-detail-value" l-text="newsletter ? 'Yes' : 'No'"></span>
            </div>
            <div class="preview-detail">
              <span class="preview-detail-label">Theme</span>
              <span class="preview-detail-value" l-text="darkMode ? 'Dark' : 'Light'"></span>
            </div>
            <div class="preview-detail">
              <span class="preview-detail-label">Password</span>
              <span class="preview-detail-value" l-text="password ? strengthLabel : '---'"></span>
            </div>
            <template l-if="plan && plan !== 'free'">
              <div class="preview-detail">
                <span class="preview-detail-label">Billing</span>
                <span class="preview-detail-value" l-text="annual ? 'Annual' : 'Monthly'"></span>
              </div>
            </template>
          </div>
          <div class="preview-status">
            <span l-text="'Profile ' + getFormProgress() + '% complete'"></span>
          </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="wizard-footer">
      <p>Powered by Loom UI &mdash; Forms without frameworks. State without stores. Magic without middleware.</p>
    </div>

  </div>

  <!-- ════════════════ Loom Core ════════════════ -->
  <script src="../registry/core/loom-core.js" data-manual></script>

  <script>
    Loom.data('wizard', function() {
      return {
        // ── Navigation ──
        step: 1,

        // ── Step 1: Personal ──
        firstName: '',
        lastName: '',
        email: '',
        phone: '',
        password: '',
        confirmPassword: '',

        // ── Password Strength (computed via l-effect) ──
        passwordStrength: 0,
        strengthColor: '',
        strengthLabel: '',

        // ── Step 2: Preferences ──
        role: '',
        favLanguage: '',
        yearsExperience: 0,
        toolFigma: false,
        toolSketch: false,
        toolAdobeXD: false,
        teamSize: 0,
        newsletter: false,
        darkMode: false,

        // ── Step 3: Plan ──
        plan: '',
        annual: false,

        // ── Step 4: Review ──
        termsAccepted: false,

        // ── Submission State ──
        submitting: false,
        submitted: false,

        // ── Validation ──
        errors: {
          firstName: '',
          lastName: '',
          email: '',
          password: '',
          confirmPassword: '',
          role: '',
          plan: '',
          terms: ''
        },

        // ── Computed helpers (called as methods since Object.assign flattens getters) ──
        getFormProgress: function() {
          var filled = 0;
          var total = 10;
          if (this.firstName) filled++;
          if (this.lastName) filled++;
          if (this.email && this.isValidEmail(this.email)) filled++;
          if (this.password && this.password.length >= 8) filled++;
          if (this.confirmPassword && this.confirmPassword === this.password) filled++;
          if (this.role) filled++;
          if (this.plan) filled++;
          if (this.phone) filled++;
          if (this.termsAccepted) filled++;
          if (this.newsletter || this.darkMode) filled++;
          return Math.round((filled / total) * 100);
        },

        getInitials: function() {
          var f = this.firstName ? this.firstName.charAt(0).toUpperCase() : '';
          var l = this.lastName ? this.lastName.charAt(0).toUpperCase() : '';
          return (f + l) || '?';
        },

        getProPrice: function() {
          return this.annual ? 10 : 12;
        },

        getEnterprisePrice: function() {
          return this.annual ? 39 : 49;
        },

        getRoleDisplay: function() {
          var map = { developer: 'Developer', designer: 'Designer', manager: 'Manager', other: 'Other' };
          return map[this.role] || 'Not selected';
        },

        getRoleDetails: function() {
          if (this.role === 'developer') {
            var lang = this.favLanguage || 'Not specified';
            var yrs = this.yearsExperience ? this.yearsExperience + ' years' : 'Not specified';
            return lang.charAt(0).toUpperCase() + lang.slice(1) + ', ' + yrs;
          }
          if (this.role === 'designer') {
            var tools = [];
            if (this.toolFigma) tools.push('Figma');
            if (this.toolSketch) tools.push('Sketch');
            if (this.toolAdobeXD) tools.push('Adobe XD');
            return tools.length ? tools.join(', ') : 'No tools selected';
          }
          if (this.role === 'manager') {
            return this.teamSize ? 'Team of ' + this.teamSize : 'Team size not specified';
          }
          return '---';
        },

        getPlanDisplay: function() {
          var map = { free: 'Free', pro: 'Pro', enterprise: 'Enterprise' };
          return map[this.plan] || 'Not selected';
        },

        getBillingDisplay: function() {
          if (this.plan === 'free') return 'Free forever';
          var price = this.plan === 'pro' ? this.getProPrice() : this.getEnterprisePrice();
          return '$' + price + '/mo' + (this.annual ? ' (billed annually)' : '');
        },

        // ── Init: watch password for strength ──
        initWatchers: function() {
          var self = this;
          this.$watch('password', function(val) {
            self.computePasswordStrength(val);
          });
        },

        // ── Password Strength ──
        computePasswordStrength: function(pw) {
          var score = 0;
          if (!pw) { this.passwordStrength = 0; this.strengthLabel = ''; this.strengthColor = ''; return; }
          if (pw.length >= 8) score++;
          if (pw.length >= 12) score++;
          if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
          if (/[0-9]/.test(pw)) score++;
          if (/[^A-Za-z0-9]/.test(pw)) score++;
          if (score > 4) score = 4;

          this.passwordStrength = score;
          var labels = ['', 'Weak', 'Fair', 'Strong', 'Excellent'];
          var colors = ['', 'oklch(0.55 0.22 25)', 'oklch(0.75 0.15 75)', 'oklch(0.60 0.18 155)', 'oklch(0.55 0.22 264)'];
          this.strengthLabel = labels[score];
          this.strengthColor = colors[score];
        },

        // ── Email Validation ──
        isValidEmail: function(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        },

        // ── Step Validation ──
        validateStep: function(s) {
          var valid = true;
          var errs = {
            firstName: '',
            lastName: '',
            email: '',
            password: '',
            confirmPassword: '',
            role: '',
            plan: '',
            terms: ''
          };

          if (s === 1) {
            if (!this.firstName) { errs.firstName = 'First name is required'; valid = false; }
            if (!this.lastName) { errs.lastName = 'Last name is required'; valid = false; }
            if (!this.email) { errs.email = 'Email is required'; valid = false; }
            else if (!this.isValidEmail(this.email)) { errs.email = 'Please enter a valid email address'; valid = false; }
            if (!this.password) { errs.password = 'Password is required'; valid = false; }
            else if (this.password.length < 8) { errs.password = 'Password must be at least 8 characters'; valid = false; }
            if (!this.confirmPassword) { errs.confirmPassword = 'Please confirm your password'; valid = false; }
            else if (this.password !== this.confirmPassword) { errs.confirmPassword = 'Passwords do not match'; valid = false; }
          }

          if (s === 2) {
            if (!this.role) { errs.role = 'Please select a role'; valid = false; }
          }

          if (s === 3) {
            if (!this.plan) { errs.plan = 'Please select a plan'; valid = false; }
          }

          if (s === 4) {
            if (!this.termsAccepted) { errs.terms = 'You must accept the terms to continue'; valid = false; }
          }

          // Single assignment triggers reactivity
          this.errors = errs;
          return valid;
        },

        // ── Navigation ──
        nextStep: function() {
          if (this.validateStep(this.step)) {
            this.step++;
          }
        },

        prevStep: function() {
          if (this.step > 1) this.step--;
        },

        goToStep: function(s) {
          // Allow going back freely, but validate before going forward
          if (s < this.step) {
            this.step = s;
          } else if (s > this.step) {
            // Validate all intermediate steps
            for (var i = this.step; i < s; i++) {
              if (!this.validateStep(i)) return;
            }
            this.step = s;
          }
        },

        // ── Keyboard Navigation ──
        handleEnter: function() {
          if (this.submitted || this.submitting) return;
          if (this.step < 4) {
            this.nextStep();
          } else {
            this.submitForm();
          }
        },

        handleEscape: function() {
          if (this.submitted || this.submitting) return;
          this.prevStep();
        },

        // ── Submit ──
        submitForm: function() {
          if (!this.validateStep(4)) return;
          if (!this.termsAccepted) return;

          var self = this;
          self.submitting = true;

          // Simulate network request
          setTimeout(function() {
            self.submitting = false;
            self.submitted = true;
          }, 2200);
        },

        // ── Reset ──
        resetForm: function() {
          this.step = 1;
          this.firstName = '';
          this.lastName = '';
          this.email = '';
          this.phone = '';
          this.password = '';
          this.confirmPassword = '';
          this.passwordStrength = 0;
          this.strengthColor = '';
          this.strengthLabel = '';
          this.role = '';
          this.favLanguage = '';
          this.yearsExperience = 0;
          this.toolFigma = false;
          this.toolSketch = false;
          this.toolAdobeXD = false;
          this.teamSize = 0;
          this.newsletter = false;
          this.darkMode = false;
          this.plan = '';
          this.annual = false;
          this.termsAccepted = false;
          this.submitting = false;
          this.submitted = false;
          this.errors = {
            firstName: '',
            lastName: '',
            email: '',
            password: '',
            confirmPassword: '',
            role: '',
            plan: '',
            terms: ''
          };
        }
      };
    });

    Loom.start();
  </script>
